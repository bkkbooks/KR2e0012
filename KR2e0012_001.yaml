body:
  text: 松漠紀聞卷一宋洪皓撰女真即古肅慎國也東漢謂之挹婁元魏謂之勿吉隋唐謂之韎􅞘唐開皇中遣使貢獻文帝因宴勞之使者及其徒起舞於前曲折皆為戰鬬之狀其屬分六部有黑水部即今之女真其水掬之則色微黑契丹目為混同江其江甚深狹處可六七十步濶處至百步唐太宗征髙麗韎鞨部佐之戰甚力駐驆之敗髙延夀髙惠真以衆及韎鞨部兵十餘萬來降開元中其酋來朝拜為勃利州刺史遂置黑水府以部長為都督刺史朝廷為置長吏監之賜府都督姓李氏訖唐世朝獻不絶五代時始稱女真後唐明宗時嘗冦登州渤海擊走之其後避契丹諱更為女直契丹之諱曰宗真俗訛為女質居混同江之南者謂之熟女真以其服屬契丹也江之北為生女真亦臣于契丹後有酋豪受其宣命為首領者號太師契丹自賓州混同江北八十餘里建寨以守豫嘗自賓涉江過其寨守禦已廢所存者數十家耳女真之主乃新羅人號完顔氏完顔猶漢言王也女真以其練事後隨以首領讓之兄弟三人一為熟女真之長號萬户其一適他國完顔年六十餘女真妻之以女亦六十餘生二子其長子即呼蘭也自此傳三人至英格太師無子以其姪阿固達之弟諡曰文烈者為子其後英格生子達蘭乃令文烈歸宗金主九代祖名函普追諡景元皇帝號始祖配曰明懿皇后八代祖名烏嚕追諡德皇帝配曰思皇后七代祖名巴哈追諡安皇帝配曰節皇后六代祖名綏赫追諡定昭皇帝號獻祖配曰恭靖皇后五代祖貝勒名舒魯追諡成襄皇帝號昭祖配曰威順皇后髙祖太師名呼蘭追諡惠桓皇帝號景祖配曰昭肅皇后曽祖太師名和哩布追諡聖肅皇帝號世祖配曰翼簡皇后曽叔祖太師名頗拉淑追諡穆憲皇帝號肅宗配曰靜宣皇后曾季祖太師名英格追諡孝平皇帝號穆宗配曰貞惠皇后伯祖太師名呼喇蘇追諡恭簡皇帝號康宗配曰敬僖皇后太祖名旻世祖第二子咸雍四年嵗在戊申生即阿固達也滅契丹諡大聖武元皇帝號太祖同母弟二人長曰烏竒邁次曰舍音阿固達卒烏竒邁立更名晟諡文烈皇帝號太宗配曰明德皇后今主名亶阿固達之孫勝果之子勝果追諡景宣皇帝亶之配曰圗克坦氏金太祖八子正室生勝果於次為第五又生第七子乃燕京留守易王之父正室卒其繼室立亦生二子長曰二太子為東元帥封許王南歸至燕而卒次生第六子曰額爾衮嘗封兖王大傳領尚書省事長子固倫側室所生為太師涼國王領尚書省事第三曰三太子為左元帥與四太子同母四太子即烏珠也為越王行臺尚書令第八子曰邢王為燕京留守打毬墜馬死勝果死今主養於固倫家及烏竒邁卒其子宋國王與固倫尼瑪哈爭立以今主為嫡遂立之太宗乙卯年卒長子曰宗磐為宋王太傳領尚書省事與滕王虞王皆為烏舍所誅次曰賢為沂王燕京留守次曰滕王虞王袁王舍音稱安班貝勒烏竒邁時為儲君嘗謀盡誅南人達蘭封魯王為都元帥後被誅其子台哈伊瑪亦被囚因赦得出庶子烏頁後名朂字勉道今為平章尼瑪哈者烏竒邁三從兄弟名宗幹小名烏嘉努其父即阿羅里伊拉齊貝勒為西元帥後雖貴亦襲父官稱曰阿羅里伊拉貝勒都元帥貝勒彼云大官人也其庶弟名宗憲字吉甫好讀書甚賢烏舍者女真人名希尹封陳王為左相誅宋兖滕虞凡七十二王後為烏珠族誅回鶻自唐末浸微本朝盛時有入居秦川為熟户者女真破陜悉徙之燕山甘涼瓜沙舊皆有族帳後悉羈縻于西夏唯居四郡外地者頗自為國有君長其人卷髮深目眉修而濃自眼睫而下多虬髯土多瑟瑟珠玉帛有兜羅綿毛㲲狨錦注絲熟綾斜褐藥有腽肭臍碙砂香有乳香安息篤耨善造賓鐵刀劒烏金銀器多為商賈於燕載以橐它過夏地夏人率十而指一必得其最上品者賈人苦之後以物美惡雜貯毛連中毛連以羊毛緝之單其中以頭為袋以毛繩或線封之有甚粗者有間以離色毛者則輕細然所征亦不資其來浸熟始厚賂稅吏密識其中下品者俾指之尤能别珍寶蕃漢為市者非其人為儈則不能售價奉釋氏最甚共為一堂塑佛像其中每齋必刲羊或酒酣以指染血塗佛口或捧其足而鳴之謂為親敬誦經則衣袈裟作西竺語燕人或俾之祈禱多驗婦人類男子白晢著青衣如中國道服然以薄青紗羃首而見其面其在燕者皆久居業成能以金相瑟瑟為首飾如叉頭形而曲一二寸如古之笄形又善結金線相瑟瑟為珥及巾環織熟錦熟綾注絲線羅等物又以五色線織成𫀆名曰尅絲甚華麗又善撚金線别作一等背織花樹用粉繳經嵗則不佳辛酉嵗金國肆眚皆許西歸多留不反烏舍者國最小不知其始所居後為契丹徙置黃龍府南百餘里曰賓州州近混同江即古之粟末河黑水也部落雜處以其族類之長為千户統之契丹女真貴遊子弟及富家兒月夕被酒則相率攜尊馳馬戲飲其地婦女聞其至多聚觀之間令侍坐與之酒則飲亦有起舞歌謳以侑觴者邂追相契調謔往反即載以歸不為所顧者至追逐馬足不逺數里其攜去者父母皆不問留數嵗有子始具茶食酒數車歸寧謂之拜門因執子壻之禮昏者飲食皆以木器好置蠱他人欲其不驗者云三彈指於器上則其毒自解亦間有遇毒而斃者族多李姓豫頃與其千户李靖相知靖二子亦習進士舉其姪女嫁為烏舍子婦靖之妹曰金哥為金主之伯固倫側室其嫡無子而金哥所生今年約二十餘頗好延接儒士亦讀儒書以光祿大夫為吏部尚書其父死託宇文虛中髙士談趙伯璘為志髙宇文以趙貧命趙為之而二人書篆其文額所濡甚厚曽在燕識之亦學奕象戲點茶靖以光祿知同州冒墨有素今亡矣其論議亦可聽渤海國去燕京女真所都皆千五百里以石纍城足東並海其王舊以大為姓右姓曰髙張楊竇烏李不過數種部曲奴婢無姓者皆從其主婦人皆悍妬大氏與他姓相結為十姊妹迭幾察其夫不容側室及他遊聞則必謀置毒死其所愛一夫有所犯而妻不之覺者九人則羣聚而詬之爭以忌嫉相夸故契丹女真諸國皆有女倡而其良人皆有小婦侍婢唯渤海無之男子多智謀驍勇出他國右至有三人渤海當一虎之語契丹按巴堅滅其王大諲撰徙其名帳千餘户于燕給以田疇捐其賦入往來貿易關市皆不征有戰則用為前驅天祚之亂其聚族立姓大者於舊國為王金人討之軍未至其貴族髙氏棄家來降言其虛實城後陷契丹所遷民益蕃至五千餘户勝兵可三萬金人慮其難制頻年轉戍山東每徙不過數百家至辛酉嵗盡驅以行其人大怨富室安居踰二百年往往為園池植牡丹多至三二百本有數十幹叢生者皆燕地所無才以十數千或五千賤貿而去其居故地者令歸契丹舊為東京置留守有蘇扶等州蘇與中國登州青州相直每大風順隱隱聞雞犬聲托雲不得立鞅鞅嘗賦詩曰小山壓大山大山全無力羞見當鄉人從此投外國遂自蘇乘筏浮海歸唐明宗善畫馬好經籍猶以筏載行其國初倣唐置官司國少浮圗氏有趙崇德者為燕都運未六十餘休致為僧自為大院請燕竹林寺慧日師住持約供衆僧三年費竹林乃四明人趙與豫相識頗久古肅慎城四面約五里餘遺堞尚在在渤海國都外三十里亦以石纍城腳黃頭女真者皆山居號哈斯罕女真哈斯罕河西亦有之有八館在黃河東今皆屬金人與金粟城五花城隔河相近二城八館舊屬契丹今屬夏人金人約以兵取關中以三城八館報之後背約再取八館而三城在河西屢爭不得其一城忘其名其人戇朴勇鷙不能别死生金人每出戰皆被以重札令前驅謂之硬軍後役之益苛廩給既少遇鹵掠所得復奪之不勝忿天會十一年遂叛興師討之但守遏山下不敢登其巢穴經二年出鬭而敗復降疑即黃頭室韋也金國謂之黃頭生女真髭髮皆黃目精多緑亦黃而白多因避契丹諱遂稱黃頭女直道宗末年阿固達來朝以烏舍從與遼貴人雙陸貴人投瓊不勝妄行馬阿固達憤甚拔小佩刀欲剚之烏舍急以手握鞘阿固達止得其柄􅳥其胸不死道宗怒侍臣以其強悍咸勸誅之道宗曰吾方示信以待逺人不可殺或以王衍縱石勒張守圭赦安祿山終致後害為言亦不聼卒歸之至叛遼用烏舍為謀主阿固達且死囑其子固倫善待之初女真有戎器而無甲遼之近親有以衆叛間入其境上為女真一酋説而擒之得甲首五百女真賞其酋為阿羅里伊拉齊彼云第三個官人亦呼為相公既起師才有千騎用其五百甲攻破寧江州遼衆五萬禦之不勝復倍遣之亦折北遂益至二十萬女真以衆寡不敵謀降大酋尼瑪哈烏舍羅索等曰我殺遼人已多降必見勦不若以死拒之時勝兵至三千既連敗遼師器甲益備與戰復克天祚乃發蕃漢五十萬親征大將伊都隂謀廢之立其庶長子趙王謀泄以前軍十萬降遼軍大震天祚怒國人叛已命漢兒遇契丹則殺之初遼制契丹人殺漢兒者皆不加刑至是攄其宿憤見者必死國中駭亂皆莫為用女真乘勝入黃龍府五十餘州浸逼中京中京古白霫城天祚懼遣使立阿固達為國王阿固達留之遣使邀請十事欲册帝為兄弟國及尚主使數往反天祚不得已欲帝之而他請益堅天祚怒曰小夷乃欲偶吾女邪囚其使不報已而中京被圍跳至上京過燕遂投西夏夏人雖舅甥國畏女真之強不果納初大觀中本朝遣林攄使遼遼人命習儀攄惡其屑屑以蕃狗詆伴使天祚曰大宋兄弟之邦臣吾臣也今辱吾左右與辱我同欲致之死在廷恐兆釁皆泣諌止杖半百而釋之時天祚窮將來歸以是故恐不加禮乃走小博囉復不納乃夜回欲之雲中未明遇牒者言羅索軍且至天祚大驚時從騎尚千餘有精金鑄佛長丈有六尺者他寶貨稱是皆委之而遁值天微雪車馬皆有轍迹為敵所及先遣近貴論降未復羅索下馬跽于天祚前曰奴婢不佞乃以介胄犯皇帝天威死有餘罪因捧觴而進遂俘以還封海濱王處之東海上其初走河西也國人立其季父於燕俄死以其妻代後與郭藥師來降所謂蕭太后者寧江州去冷山百七十里地苦寒多草木如桃李之類皆成園至八月則倒置地中封土數尺覆其枝幹季春出之厚培其根否則凍死每春冰始泮遼主必至其地鑿冰釣魚放弋為樂女真率來獻方物若貂鼠之屬各以所産量輕重而博易之後多強取女真始怨暨阿固達起兵首破此州馴致亡國遼亡達實林牙亦降達實小名林牙猶翰林學士遼俗人槩以小名居官工後與尼瑪哈雙陸爭道尼瑪哈心欲殺之而口不言達實懼及既歸帳即棄其妻擕五子宵遁詰旦尼瑪哈怪其日髙而不來使召之其妻曰昨夕以酒忤大人畏罪而竄詢其所之不以告尼瑪哈大怒以配部落之最賤者妻不肯屈強之極口嫚罵遂射殺之達實深入沙子立天祚之子梁王為帝而相之女真遣故遼將伊都帥兵經略屯田和勒端城城去上京三千里達實遊騎數十出入軍前伊都遣使打話遂退沙子者蓋不毛之地平沙廣漠風起揚塵至不能辨色或平地頃刻髙數丈絶無水泉人多渴死達實之走凡三晝夜始得度故女真不敢窮追遼御馬數十萬牧于磧外女真以絶逺未之取皆為達實所得今梁王達實皆亡餘黨猶居其地和勒端之役令山西河北運糧給軍豫過河隂縣令以病假獨簿出迎以線繫槐枝垂緑袍上命之坐懇辭叩其故以實言曰縣饋餉失期令被撻栁條百慙不敢出某亦罹此罰痛楚特甚故不可坐創未愈懼為腋氣所侵故帶槐以辟之伊都之降也金人以為西軍大監軍久不遷常鞅鞅其軍和勒端失其金牌金人疑其與林牙暗合遂質其妻子伊都遂有叛心明年九月約燕京統軍反統軍之兵皆契丹人伊都密謀誅西軍之在雲中者盡約雲中河東河北燕京郡守之契丹漢兒令誅女真之在官在軍者天德知軍偽許之遣其妻來告時烏舍為西監軍自雲中來燕微聞其事而未信與通事諾音回行數百里諾音見二騎馳甚遽問之曰曾見監軍否以不識對問為誰白伊都部下人也諾音追及烏舍曰適兩契丹云伊都部下人既在西京何故不識監軍北人稱雲中為西京恐有姦謀遂回馬追獲之搜其靴中得伊都私書曰事已泄宜便下手復馳告烏舍即回燕統軍來謁縳而誅之又二日至雲中伊都已微覺父子以遊獵為名遁入夏國夏人問有兵幾何云親兵二三百遂不納投達靼達靼先受烏舍之命其首領詐出迎具食帳中潛以兵圍之達靼善射無衣甲伊都自出敵不勝父子皆死凡預謀者悉誅契丹之黠及漢兒之有聲者皆不免金國舊俗多指腹為婚姻既長雖貴賤殊隔亦不可渝壻納幣皆先期拜門戚屬偕行以酒饌往少者十餘車多至十倍飲客佳酒則以金銀器貯之其次以瓦器列於前以百數賓退則分餉焉男女異行而坐先以烏金銀杯酌飲貧者以木酒三行進大軟脂小軟脂如中國寒具蜜糕以松實胡桃肉漬蜜和糯粉為之形或方或圓或為柿蒂花大略類浙中實楷糕人一盤曰茶食宴罷富者瀹建茗留上客數人啜之或以粗者煎乳酪婦家無大小皆坐炕上壻黨羅拜其下謂之男下女禮畢壻牽馬百匹少者十匹陳其前婦翁選子姓之别馬者視之賽音則留好也拉拉則退不好也留者不過什二三或皆不中選壻所乘亦以充數大抵以留馬少為恥女家亦視其數而厚薄之一馬則報衣一襲壻皆親迎既成昏留婦氏執僕𨽻役雖行酒進食皆躬親之三年然後以婦歸婦氏用奴婢數十户牛馬數十羣每羣九牸一牡以資遣之契丹男女拜皆同其一足跪一足著地以手動為節數止於三金主生於七月七日以國忌用次日今朝廷遣賀使以正月至彼蓋循契丹故事不欲使人兩至也金國治盜甚嚴每捕獲論罪外皆七倍責償唯正月十六日則縱偷一日以為戲寶貨車馬為人所竊皆不加刑是日人皆嚴傋遇偷至則笑遣之既無所獲雖圗钁微物亦攜去婦人至顯入人家伺主者出接客則縱其婢妾盜飲器他日知其主名或偷者自言大則具茶食以贖謂羊酒肴饌之類次則攜壺小亦打糕取之女真舊不知燈夕己酉嵗有僧被掠至其闕遇上元以長竿引燈毬表而出之以為戲金主見之大駭問左右曰得非星邪左右以實對時有南人謀變事泄而誅故金主疑之曰是人欲嘯聚為亂剋日時立此以為信耳命殺之後數年至燕頗識之至今遂盛金俗奉佛尤謹公卿詣寺則僧坐上坐燕京蘭若相望大者三十有六然皆律院自南僧至始立四禪曰太平招提竹林瑞像貴遊之家多為僧衣盂衣鉢也甚厚延夀院主有質坊二十八所僧職有正副判緑或呼司空遼代僧有兼官至檢校司空者故名稱尚存出則乘馬佩印街司五伯各二人前導凡僧事無所不統有罪者得撻之其徒以為榮出家者無買牒之費金主以生子肆赦令燕雲汴三臺普度凡有師者皆落髮奴婢欲脫𨽻役者才以數千囑請即得之得度者亡慮三十萬舊俗姦者不禁近法益嚴立賞三百千它人得以告捕嘗有家室則許之歸俗通平民者杖背流遞僧尼自相通及犯品官家者皆死富勒呼性愛民所居官必復租薄征得蕃漢間心但時有酒過後除東京留守治渤海城敕令止飲行未抵治所有一僧以􅟥柃癭盂遮道而獻㮦柃木多有文縷可愛多用為碗曰可以酌酒富勒呼曰皇帝臨遣時宣戒我勿得飲爾何人乃欲以此器導我耶顧左右令斡布哈國語云令殺之也即引去行刑者哀其亡辜擊其腦不力欲令宵遁而以死告未畢復呼使前僧被血淋漓富勒呼曰所以獻我意者安在對曰大王仁慈正直百姓喜幸故敢奉此為夀無他志也富勒呼意解欲釋之詢其鄉以渤海對富勒呼笑曰汝聞我來用此相鶻突耳豈可赦也卒殺之又於道遇僧尼五輩共輦而載召而責之曰汝曹羣遊已冒法而乃敢顯行吾前邪皆射殺之金國之法國人官漢地者皆置通事即譯語官也或以有官人為之上下重輕皆出其手得以舞文招賄三二年皆致富民俗苦之有尼楚赫大王者宗室子封金源郡王以戰多貴顯而不熟民事嘗留守燕京有民數十家負富僧金六七萬緡不肯償僧誦言欲申訴逋者大恐相率賂通事祈緩之通事曰汝輩所負不資今雖稍遷延終不能免茍能厚謝我為汝致其死皆欣然許諾僧既陳牒跪聽命通事潛易它紙譯言曰久旱不雨僧欲焚身動天以蘇百姓尼楚赫笑即書牒尾稱賽音者再庭下已有牽擺官二十輩驅之出僧莫測所以扣之則曰賽音好也狀行矣須臾出郭則逋者已先期積薪擁僧於上四面舉火號呼稱寃不能脫竟以焚死金國新制大抵依倣中朝法律至皇統三年頒行其法有創立者率皆自便如毆妻至死非用刃者不加刑以其側室多恐正室妬忌也北人重赦無郊霈豫銜命十五年才兩見赦一為平伊都叛一為皇子生蒙果勒其人長七八尺捕生麋鹿食之金人嘗獲數輩至燕其目能視數十里秋毫皆見蓋不食煙火故眼明與金人隔一江常度江之南為寇禦之則返無如之何金國天會十四年四月中京小雨大雷震羣犬數十爭赴土河而死所可救者才二三爾松漠紀聞卷一
