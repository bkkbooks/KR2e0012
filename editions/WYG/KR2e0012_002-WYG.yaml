body:
  text: 松漠紀聞卷二宋洪皓撰冷山去燕山三千里去金國所都二百餘里皆不毛之地乙卯嵗有二龍不辨名色身髙丈餘相去數步而死冷氣腥焰襲人不可近一已無角如截去一額有竅大若當三錢如斧鑿痕烏舍欲遣人截其角或以為不祥乃止戊午夏熙州野外濼水有龍見三日初於水面見蒼龍一條良久即没次日見金龍以爪托一嬰兒兒雖為龍所戲弄畧無懼色三日金龍如故見一帝者乘白馬紅衫玉帶如少年中官狀馬前有六蟾蜍凡三時方没郡人競徃觀之相去甚近而無風濤之害熙州嘗以圗示劉豫劉不悦趙伯璘曽見之是年五月汴都太康縣一夕大雷雨下冰龜亘數十里龜大小不等首足卦文皆具安巴堅居西樓宿氊帳中晨起見黒龍長十餘丈蜿蜒其上引弓射之即騰空夭矯而逝墜于黄龍府之西相去已千五百里纔長數尺其骸尚在金國内庫烏舍長子源嘗見之尾鬛支體皆全雙角已為人所截與予所蔵董羽畫出水龍絶相似蓋其背上鬛不作魚鬛也烏舍第三子逹勒逹勁勇有智力兼百人烏舍常與之謀國富勒呼之死逹勒逹承詔召入自後執其手而殺之為明威將軍正月十六挾奴僕十輩入寡嬸家烝焉烏舍在闕下金都也其長子以告命械繫于家烏舍至問其故曰放偷敢爾烏舍命縳杖其背百餘釋之體無傷金法縳者必死逹勒逹始謂必杖聞縛而驚遂失心歸室不能坐呼曰我將去人問之曰適富勒呼来後旬日死烏舍哭之慟曰折我手足是年九月烏舍亦坐誅己未年五月客星守魯烏舍占之太史曰不在我分野外方小災無傷至七月魯兖宋滕虞諸五同日誅庚申年星守陳太史以告宇文宇文語烏舍烏舍時為陳王烏舍不以為怪至九月而誅金人科舉先於諸州分縣赴試詩賦者兼論作一日經義者兼論䇿作三日號為鄉試悉以本縣令為試官預試之士唯雜犯者黜牓首曰鄉元亦曰解元次年春分三路類試自河以北至女真皆就燕關西及河東就雲中河以南就汴謂之府試試詩賦論時務䇿經義則試五道三䇿一論一律義凡二人取一牓首曰府元至秋盡集諸路舉人于燕名曰㑹試凡六人取一牓首曰勑頭亦曰狀元分三甲曰上甲中甲下甲勑頭補承徳郎視中朝之承議上甲皆賜緋七年即至奉直大夫謂之正郎第二第三人八年或九年中甲十二年下甲十三年不以所居官髙卑皆遷大夫中下甲服緑例賜銀帶府試差官取㫖尚書省降劄知舉一人同知二人又有彌封謄録監門之類試闈用四柱揭綵其上目曰至公樓主文登之以觀試或有私者停官不叙仍決沙袋親戚不回避尤重書法凡作字有㸃畫偏旁㣲誤者皆曰雜犯先是考校畢知舉即唱名近嵗上中下甲雜取十名納之國中下翰林院重考實欲私取權貴也考校時不合格者日牓其名試院欲開餘人方知中選後又置御試已㑹試中選者皆當至其國都不復試文只以㑹試牓殿廷唱第而已士人頗以為苦多不願徃則就燕徑官之御試之制遂絶又有明經明法童子科然不擢用止於簿尉明經至於為直省官事宰執持筆研童子科止有趙憲甫位至三品省部有令史以進士及第者為之又有譯史或以練事或以關節凡遞勑或除州太守告令史譯史送之大州三數百千帥府千緍若烏珠諸貴人除授則令宰執子弟送之獲數萬緍北方苦寒故多衣皮雖得一鼠亦禠皮蔵去婦人以羔皮㡌為飾至直十數千敵三大羊之價不貴貂鼠以其見日及火則剥落無色也初漢兒至曲阜方發宣聖陵尼瑪哈聞之問髙慶緒渤海人曰孔子何人對曰古之大聖人曰大聖人墓豈可發皆殺之故闕里得全燕京茶肆設雙陸局或五或六多至十博者蹴局如南人茶肆中置棊具也女真多白芍藥花皆野生絶無紅者好事之家采其芽為菜以麵煎之凡待賓齋素則用其味脆美可以久留無生薑至燕方有之每兩價至千二百金人珍甚不肯妄設遇大賓至縷切數絲寘楪中以為異品不以雜之飲食中也西瓜形如扁蒲而圓色極青翠經嵗則變黄其瓞類甜瓜味甘脆中有汁尤冷五代史四夷附録云以牛糞覆棚種之予攜以歸今禁圃鄉囿皆有亦可留數月但不能經嵗仍不變黄色鄱陽有久苦目疾者曝乾服之而愈葢其性冷故也關西羊出同州沙苑大角虬上盤至耳最佳者為卧沙細肋北羊皆長面多髯有角者百無二三大僅如指長不過四寸皆目為白羊其實亦多渾黒亦有肋細如箸者味極珍性畏怯不觝觸不越溝塹善牧者每羣必置羖䍽羊數頭羖䍽音古力北人訛呼羖為骨仗其勇狠行必居前遇水則先涉羣羊皆隨其後以羖䍽發風故不食生達靼者大如驢尾巨而厚類扇自脊至尾或重五斤皆膋脂以為假熊白食餅餌諸國人以它物易之羊順風而行每大風起至舉羣萬計皆失亡牧者馳馬尋逐有至數百里外方得者三月八月兩剪毛當剪時如欲落絮不剪則為草絆落可撚為線春毛不直錢為氊則蠧唯秋毛最佳皮皆用為裘凡宰羊但食其肉貴人享重客間兼皮以進必指而夸曰此全羊也自上京至燕二千七百五十里上京即西樓也三十里至㑹寧頭鋪四十五里至第二鋪三十五里至阿薩爾鋪四十里至來流河四十里至布逹貝勒鋪七十里至賓州渡混同江七十里至北易州五十里至濟州東鋪二十里至濟州四十里至勝州鋪五十里至小寺鋪五十里至威州四十里至信州北五十里至莽哈鋪五十里主穆斡鋪五十里至奚營西四十五里至楊相店四十五里至夾道店五十里至安州南鋪四十里至宿州北鋪四十里至咸州南鋪四十里至銅州南鋪四十里至銀州南鋪五十里至興州四十里至蒲河四十里至瀋州六十里至廣州七十里至大口六十里至梁漁務三十五里至兔兒堝五十里至沙河五十里至顯州五十里至軍官寨四十里至特哩衮塞四十里至茂州四十里至新城四十里至瑪竒部落四十里至胡家務四十里至童家莊四十里至桃花島四十里至楊家館五十里至隰州四十里至石家店四十里至來州四十里至南新寨四十里至千州四十里至潤州三十里至舊榆關三十里至新安四十里至雙望店四十里至平州四十里至赤峯口四十里至七箇嶺四十里至榛子店四十里至永濟務四十里至沙流河四十里至玉田縣四十里至羅山鋪三十里至薊州三十里至邦軍店三十五里至下店四十里至三河縣三十里至潞縣三十里至交亭三十里至燕自燕至東京一千三百十五里自東京至泗州一千三十四里自雲中至燕山數百里皆下坡其地形極髙去天甚近金之待中朝使者使副日給細酒二十量罐羊肉八斤果子錢五百雜使錢五百白麵三斤油半斤醋二升鹽半斤粉一斤細白米三升麵醬半斤大柴三束上節細酒六量罐羊肉五斤麵三斤雜使錢二百白米二升中節常供酒五量罐羊肉三斤麵三斤雜使錢一百白米一升半下節常供酒三量罐羊肉二斤麵一斤雜使錢一百白米一升半天眷二年奏請定官制劄子竊以設官分職創制立法者乃帝王之能事而不可闕者也在昔致治之主靡不皆然及世之衰也侵冒放紛官無常守事與言戾實由名喪至於不可復振逮聖人之作也剗弊救失乘時變通致治之具然後煥然一新九變復貫知言之選其此之謂矣太祖皇帝聖武經啟文物度數曽不遑暇太宗皇帝嗣位之十二載也威徳暢洽萬里同風聰明自天不凝於物始下明詔建官正名欲垂範於將來以為民極聖謨𢎞逺可舉而行克成厥終正在今日伏惟皇帝陛下上性孝徳欽奉先猷爰命有司用精詳訂臣等謹按當唐之治朝品位爵秩考覈選舉其法號為精密尚慮拘牽故逺自開元所記降及遼宋之傳參用講求有便於今者不必泥古取正於法者亦無狥習今先定到官號品次職守上進御府以塵乙覽恭俟聖斷曲加是正言順事成名賓實舉興化阜民於是乎在凡新書未載並乞姑仍舊貫徐用討論繼此奏請臣等顧惟虛薄講究不能及逺以塞明命是懼倘涓埃有取伏乞先次頒降施行荅詔曰朕聞可則循否則革事不憚於改為言之易成之難政或譏於欲速審以後舉示將不刋爰自先皇已頒明命順攷古道作新斯民欲端本於朝廷首建官於臺省豈止百司之職守必也正名是將一代之典章無乎不在能事未畢𦕈躬嗣承懼墜先猷惕増夕厲勉圗繼述申命講求雖曰法唐宜後先之一揆至於因夏固損益之殊途務折衷以適時肆於古而累嵗庶同乃繹僅至有成掇所先行用敷衆聴作室肯搆第遵底法之良若網在綱庶弭有條之紊自餘欵備繼此施陳已革乃孚行取四時之信所由適治揭為萬世之常凡在見聞共思遵守翰林學士韓昉撰詔書曰皇祖有訓非繼體者所敢忘聖人無心每立事於不得已朕丕承洪緒一紀於兹祗遹先猷百為不越故在朝廷之上其猶草昧之初比以大臣力陳懇奏謂綱紀以未舉在國家之何觀且名可言而言可行所由集事蓋變則通而通則久故用裕民宜法古官以聞政府正號以責實效著儀而辨等威天有雷風辭命安得不作人皆顔閔印符然後可捐凡此數條皆今急務禮樂之備源流在兹祈以必行斷宜有定節惟先帝亦鑒㣲衷神豈可誣方在天而對越時由偶異若易地則皆然是用載維殆非相反何必改作蓋嘗三復於斯言皆曰可行庶將一變而至道乃從所議用創新規維兹故土之風頗尚先民之質性成於習遽易為難政有所因姑宜仍舊漸祈胥效翕致大同凡在邇遐當體朕意其所改創事件宜令尚書省就便從宜施行宋兖諸王之誅韓昉作詔曰周行管叔之誅漢致燕王之辟兹惟無赦古不為非豈親親之道有所未敦以惡惡之心是不可忍朕自惟冲昧猥嗣統臨蓋由文烈之公欲大武元之後徳雖為否義亦當然不圗骨肉之間有懷蠭䘍之毒皇伯太師宋國王宗磐族聨諸父位冠三師始朕承祧乃繄協力肆登極品兼綰劇權何為失圗以底不類謂為先帝之元子常蓄無君之禍心昵信宵人煽為姦黨坐圗問鼎行將弄兵皇叔太傅領三省事兖國王宗雋為國至親與朕同體内懷悖徳外縱虚驕肆已之怒専殺以取威擅公之財市恩而惑衆力擯勲舊欲孤朝廷即其所疎濟以同惡皇叔虞王宗英滕王宗偉殿前左副㸃檢琿都㑹寧少尹呼實喇郎君石嘉努千户斡爾古楚等競為禍始舉好亂從逞躁欲以無厭助逆謀之妄作意所非冀獲其必成先將賊其大臣次欲危其宗廟造端累嵗舉事有期早露端倪每存含覆第嚴禁衛載肅禮文庶見君親之威少安臣子之分蔑然不顧狂甚自如尚賴神明之靈克開社稷之福日者叛人呉十稔心稱亂授首底亡爰致克奔之徒乃窮相與之黨得厥情狀孚於見聞皆由左騐以質成莫敢詭辭而抵讕欲申三宥公議豈容不頓一兵羣兇悉殄於今月三日已各伏辜并令有司除屬籍訖自餘詿誤更不躡尋庶示寛容用安反側民畫衣而有犯古猶欽哉予素服以如喪情可知也陳王烏舍加恩制詞曰貴貴尊賢式重儀刑之望親親尚齒亦優宗族之恩朕俯迫羣情祗膺顯號爰第景風之賞孰居台曜之先凡爾在廷聴予作命具官屬為諸父身相累朝蹈五常九徳之規為四輔三公之冠當艱難創業之際藉左右宅師之勤如獻兆之信蓍龜如濟川之待舟楫迪我髙后格于皇天屬正統之有歸賴嘉謀之先定緝熙百度董正六官雍容以折肘腋之姦指顧以定朔南之地徳業並茂古今罕倫迨兹慶賜之頒詢及僉諧之論謂上公之加命有九而天下之達尊者三既已兼全無可増益乃敷求於載籍仍自斷於朕心杖以造朝前已加於異數坐而論道今復舉於舊章蕭相國賜詔不名安平王肩輿升殿併兹優渥以奬耆英於戲建無窮之基則必享無窮之福錫非常之禮所以報非常之功欽承體貌之隆共對邦家之祉皇后費摩氏謝上表曰龍衮珠旒端臨雲陛玉書金璽榮畀椒房恭受以還凌兢罔措恭惟道兼天覆明並日升誠意正心基周王之風化制禮作樂煥堯帝之文章俯矜奉事之勞飭遣光華之使温言奬飾美貌重仍顧拜命之甚優慙省躬而莫稱謹當恪遵睿訓益勵肅心庶幾婦道之修仰助人文之化渤海賀正表曰三陽應律載肇於歳華萬夀稱觴欣逢於元會恭惟受天之祜如日之升布治惟新順夏時而謹始卜年方永邁周厯以垂休臣幸際明昌良深抃頌逺馳信幣用申祝聖之誠仰冀清躬茂集履端之慶夏國賀正表曰斗柄建寅當帝厯更新之旦葭灰飛管屬皇圗正始之辰四序推先一人履慶恭惟化流中外徳視邇遐方熙律之載陽應令候而布惠克凝神於窔奥務行政於要荒四表無虞羣黎至治爰鳳闕届春之早協龍廷展賀之初百辟稱觴用盡輸誠之意萬邦薦祉克堅獻嵗之心臣無任云云大使武功穆蘓好德副使宣徳郎季膺等齎表詣闕以聞高麗賀正表曰帝出乎震方當遂三陽之生王次於春所以大一統之始覆幬之内歡慶皆均恭惟中孚應天大有得位所過者化閱衆甫以常新不怒而威觀庶邦之率服茂對佳辰之復備膺諸福之休臣幸遘昌期逺居外服上千萬嵗夀㑹莫預於臚傳同億兆人心但竊深於善祝云云使朝散大夫衛尉少卿輕車都尉賜紫金魚袋李仲衍奉表稱賀以聞右松漠記聞正續二卷先君銜使十五年深院窮漠耳目所接隨筆纂録聞孟公庾發篋汴都危變歸計創艾而火其書秃節來歸因語言得罪柄臣諸子佩三緘之戒循陔侍䣛不敢以北方事置齒牙間及南徙炎荒視膳餘日稍亦談及逺事凡不涉今日强弱利害者因操牘記其一二未幾復有私史之禁先君亦枕末疾遂廢不録及柄臣蓋棺弛語言之律而先君已齎恨泉下鳩拾殘藁厪得數十事反􅃑拭面著為一篇紹興丙子夏男适謹書松漠記聞補遺嘗有一武弁經西元帥投牒誤斥其諱杖背流遞武元初只諱旻後有申請云旻閔也遂併閔諱之金國中丞唯掌訟牒若斷獄㑹法或春山秋水謂去國數百里逐水草而居處從駕在外衛兵物故則掌其骸骼正國則歸其家諫官並以他官兼之與臺官皆備員不彈擊外道雖有漕使亦不刺舉故官吏贓穢略無所憚金法文武官不以髙下凡丁家艱未滿百日皆差監關税州商税院鹽鐵塲一年為任謂之優饒其税課倍増者謂之得籌每一籌轉一官有嵗中八九遷者近有止法不得過三官富者擇課額少處受之或以家財貼納只圗遷轉其不欲遷者於課利多處除嵗額外公然分之金人有負犯者不責降只差監鹽塲課額雖登出賣甚遲雖任滿去官非賣盡不得仕至有十年不調者無磨勘之法每一任轉一官以二十五月為任將滿即改除並不待闕北地張獻甫作太原都軍都監也其姊夫劉思與侍郎髙慶裔為十友之數張有一犀帶國初錢王所獻者號鎮國寳帶是正透中間龍形契丹重骨咄犀犀不大萬株犀無一不曽作帶紋如象牙帶黄色止是作刀把已為無價天祚以此作陶罕中國謂之腰條皮插垂頭者鹿頂合燕以北者方可車須是未解角之前才解角血脈通冬至方解頂之上為合正須亦作合好者有人字不好者成八字有髓眼不實北人謂角為鹿角合頂為鹿頂合南中止有鹿角合南鹿不實定有髓眼不可車北地角未老不至秋時不中麋角與鹿角不同麋角如駞骨通身可車却無紋生枝不比鹿皆小鹿頂骨有紋上下無之亦可熏成紋犀有三種重透外黒有一暈白中又黒世艱得之正透又曰通犀倒透亦曰花犀或斑犀有遊魚形諸犀中水犀最貴秀州周通直家有正透犀帶其中一㸃白以紙燈近之即時滅有濕氣疑是水犀耀叚褐色涇叚白色生絲為經羊毛為緯好而不耐豐叚有白有褐最佳駞毛叚出河西有褐有白秋毛最佳不蛀冬間毛落去毛上之麄者取其茸毛皆關西羊為之蕃語謂之劷北羊止作麄毛先忠宣松漠記聞伯兄鏤板歙越遵來守建業又刻之暇日廋閲故牘得北方十有一事皆曩嵗侍親傍聞之者目曰補遺附載於此乾道九年六月二日第二男資政殿大學士左中大夫知建康府江南東路安撫使兼行宫留守遵謹書松漠紀聞卷二
